# Majicle CD - main push で自動デプロイ
#
# 仕組み:
#   1. main に push されたらトリガー
#   2. npm ci + npm run build でビルド
#   3. S3 に sync (HTML=短キャッシュ, アセット=長期キャッシュ)
#   4. CloudFront の index.html だけ invalidation
#
# 認証方式: OIDC (IAMアクセスキー不要、一時トークンで安全)
# GitHub Secrets は不要。IAM Role が OIDC で自動認証される。

name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - "forbidden-sigil/**"  # forbidden-sigil 配下の変更のみトリガー

# OIDC トークン発行に必要な権限
permissions:
  id-token: write
  contents: read

env:
  BUCKET_NAME: forbidden-sigil-app
  DISTRIBUTION_ID: E3QTZX5XO8B8CT
  REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::149101264858:role/MajicleGitHubActionsRole

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forbidden-sigil

    steps:
      # ── ソース取得 ──
      - uses: actions/checkout@v4

      # ── Node.js セットアップ ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: forbidden-sigil/package-lock.json

      # ── 依存インストール ──
      - run: npm ci

      # ── ビルド ──
      - run: npm run build

      # ── AWS 認証 (OIDC — キー不要、一時トークン) ──
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      # ── S3 sync: HTML (短キャッシュ) ──
      - run: |
          aws s3 sync dist "s3://$BUCKET_NAME" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=60"

      # ── S3 sync: アセット (長期キャッシュ、ハッシュ付き) ──
      - run: |
          aws s3 sync dist "s3://$BUCKET_NAME" \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      # ── CloudFront invalidation (HTMLだけでOK) ──
      - run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/index.html" "/"
